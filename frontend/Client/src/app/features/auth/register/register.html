<div class="page auth-page">
  <h1>Create account</h1>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
    <label>Name</label>
    <input formControlName="name" />
    <div class="error" *ngIf="isInvalid('name')">Enter a valid name</div>

    <label>Email</label>
    <input formControlName="email" />
    <div class="error" *ngIf="isInvalid('email')">Enter a valid email</div>

    <label>Password</label>
    <input type="password" formControlName="password" />
    <div class="error" *ngIf="isInvalid('password')">Password must be at least 8 characters</div>

    <div class="error" *ngIf="error()">{{ error() }}</div>

    <button class="btn-primary" type="submit">Create Account</button>
  </form>
</div>
