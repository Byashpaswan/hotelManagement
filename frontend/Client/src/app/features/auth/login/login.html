
    <div class="login-page">
      <div class="login-card">
        <div class="login-header">
          <div class="hotel-icon">🏨</div>
          <h1>Hotel Management</h1>
          <p>Sign in to your account</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
          @if (error()) {
            <div class="alert alert-error">{{ error() }}</div>
          }

          <div class="form-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" formControlName="email"
              placeholder="admin@hotel.com" autocomplete="email"
              [class.is-invalid]="isInvalid('email')" />
            @if (isInvalid('email')) {
              <span class="error-msg">Please enter a valid email</span>
            }
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-with-icon">
              <input id="password" [type]="showPassword() ? 'text' : 'password'"
                formControlName="password" placeholder="••••••••" autocomplete="current-password"
                [class.is-invalid]="isInvalid('password')" />
              <button type="button" class="toggle-pw" (click)="showPassword.set(!showPassword())">
                {{ showPassword() ? '🙈' : '👁️' }}
              </button>
            </div>
            @if (isInvalid('password')) {
              <span class="error-msg">Password is required</span>
            }
          </div>

          <button type="submit" class="btn-login" [disabled]="loading() || form.invalid">
            @if (loading()) { <span class="spinner"></span> Signing in... }
            @else { Sign In }
          </button>
        </form>

        <div class="demo-creds">
          <p>Demo credentials:</p>
          <code>admin@hotel.com / Admin@1234</code>
        </div>
      </div>
    </div>
